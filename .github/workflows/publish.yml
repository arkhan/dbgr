name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-dbgr:
    name: Build & publish dbgr (client)
    runs-on: ubuntu-latest
    environment: pypi-dbgr
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        working-directory: client/client
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/client/dist

  publish-dbgr-server:
    name: Build & publish dbgr-server
    runs-on: ubuntu-latest
    environment: pypi-dbgr-server
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
